version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: cbrzilla-jc-budgeting-umbrel_web_1
      APP_PORT: 5099

  web:
    image: ghcr.io/cbrzilla/jc-budgeting-server-umbrel:0.9.0-test
    restart: on-failure
    stop_grace_period: 1m
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:5099
      JCBUDGETING_SERVER_DATA_DIR: /data
    volumes:
      - ${APP_DATA_DIR}/data:/data
    ports:
      - "5099:5099"
