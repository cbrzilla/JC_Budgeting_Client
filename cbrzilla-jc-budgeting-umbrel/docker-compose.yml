services:
  app_proxy:
    environment:
      APP_HOST: cbrzilla-jc-budgeting-umbrel_web_1
      APP_PORT: 5099

  web:
    build:
      context: .
      dockerfile: ./container/Dockerfile
    restart: on-failure
    stop_grace_period: 1m
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:5099
      JCBUDGETING_SERVER_DATA_DIR: /data
    volumes:
      - \/data:/data
    ports:
      - "5099:5099"
