name: Publish Umbrel Image

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-umbrel-image.yml'
      - 'cbrzilla-jc-budgeting-umbrel/container/**'
      - 'cbrzilla-jc-budgeting-umbrel/docker-compose.yml'
      - 'cbrzilla-jc-budgeting-umbrel/umbrel-app.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./cbrzilla-jc-budgeting-umbrel
          file: ./cbrzilla-jc-budgeting-umbrel/container/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/cbrzilla/jc-budgeting-server-umbrel:latest
            ghcr.io/cbrzilla/jc-budgeting-server-umbrel:0.9.1-test
