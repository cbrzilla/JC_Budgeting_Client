name: Upload Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag or release name to upload assets to (for example v1.0.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS assets
        run: git lfs pull

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload generated release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: |
            releases/*.zip
            releases/*.tar.gz
          fail_on_unmatched_files: true
          append_body: false
          generate_release_notes: false
